# alembic.ini — Alembic migration configuration for MATM backend
# Run from the backend/ directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe change"

[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL is read directly from the environment in env.py;
# the value here is a placeholder so alembic.ini is valid if
# env.py overrides it at runtime.
sqlalchemy.url = postgresql+asyncpg://matm:matm@localhost:5432/matm

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
